<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>No Read — Artist</title>
  <link rel="stylesheet" href="auth.css?v=9" />
</head>
<body>
  <div class="shell">
    <nav class="nav">
      <a class="brand" href="index.html"><img src="assets/no-read-logo.png" alt="No Read logo"><span>No Read Label</span></a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="music.html">Listen</a>
        <a href="upload.html">Upload</a>
        <a href="settings.html">Settings</a>
        <a id="accountLink" href="login.html">Login</a>
      </div>
    </nav>

    <main class="page-wrap">
      <section id="artistHeader" class="panel"><p class="muted">Loading artist...</p></section>
      <section class="page-title"><h1>Songs</h1><p>All published songs from this No Read artist.</p></section>
      <section class="grid three" id="songsGrid"></section>
    </main>
  </div>

  <script src="auth-client.browser.js?v=20260525-1"></script>
  <script>
    const Auth = window.NoReadAuth;
    const artistHeader = document.getElementById('artistHeader');
    const songsGrid = document.getElementById('songsGrid');
    const apiUrl = (path) => /^https?:\/\//.test(path || '') ? path : `${Auth.apiBaseUrl()}${path}`;
    function escapeHtml(value) { return String(value ?? '').replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch])); }
    function params() { return new URLSearchParams(location.search); }
    function cover(song) { return song.coverImageUrl ? apiUrl(song.coverImageUrl) : 'assets/no-read-logo.png'; }
    function renderArtist(artist) {
      const banner = artist.artistBannerUrl || artist.bannerUrl;
      const avatar = artist.avatarUrl || 'assets/no-read-logo.png';
      artistHeader.innerHTML = `
        <div class="banner">${banner ? `<img src="${escapeHtml(apiUrl(banner))}" alt="artist banner">` : ''}</div>
        <div class="profile-head">
          <img src="${escapeHtml(apiUrl(avatar))}" alt="artist avatar">
          <div>
            <h1 style="font-size:clamp(2.2rem,6vw,5rem);line-height:.88;letter-spacing:-.07em;text-transform:uppercase">${escapeHtml(artist.artistName || artist.displayName || artist.username)}</h1>
            <p class="muted">@${escapeHtml(artist.username)}</p>
            <p style="margin-top:10px" class="muted">${escapeHtml(artist.artistBio || artist.bio || '')}</p>
          </div>
        </div>`;
    }
    function renderSongs(songs) {
      songsGrid.innerHTML = songs.length ? songs.map(song => `
        <article class="song-card">
          <img class="song-cover" src="${escapeHtml(cover(song))}" alt="${escapeHtml(song.title)} cover">
          <div><h3>${escapeHtml(song.title)}</h3><p class="muted">${escapeHtml(song.genre || 'No genre')}</p></div>
          <div class="song-actions"><a class="button" href="music.html">Play in listener</a></div>
        </article>
      `).join('') : '<article class="panel"><p class="muted">This artist has no published songs yet.</p></article>';
    }
    (async () => {
      const state = await Auth.getSessionState({ verify: true });
      if (state.loggedIn) { document.getElementById('accountLink').textContent = Auth.getDisplayName(); document.getElementById('accountLink').href = 'account.html'; }
      const username = params().get('username') || params().get('u');
      if (!username) { artistHeader.innerHTML = '<p class="muted">Missing artist username.</p>'; return; }
      try {
        const payload = await Auth.getArtist(username);
        const data = payload.data || payload;
        renderArtist(data.artist);
        renderSongs(data.songs || []);
      } catch (error) {
        artistHeader.innerHTML = `<p class="muted">${escapeHtml(error.message || 'Artist not found')}</p>`;
        songsGrid.innerHTML = '';
      }
    })();
  </script>
</body>
</html>
