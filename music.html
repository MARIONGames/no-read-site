<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>No Read — Listen</title>
  <link rel="stylesheet" href="auth.css?v=20260530-2" />
</head>
<body class="listen-page">
  <div class="listen-shell">
    <aside class="listen-sidebar">
      <a class="brand listen-brand" href="index.html"><img src="assets/no-read-logo.png" alt="No Read logo"><span>No Read</span></a>
      <nav class="listen-menu">
        <a class="active" href="music.html">Listen</a>
        <a href="index.html">Home</a>
        <a href="upload.html">Upload</a>
        <a href="settings.html">Settings</a>
        <a id="ownerPanelLink" href="owner-panel.html" style="display:none">Owner Panel</a>
      </nav>

      <section class="sidebar-card playlist-card">
        <div class="sidebar-title-row">
          <strong>Playlists</strong>
          <button id="newPlaylistButton" class="mini-icon-button" type="button" title="Create playlist">＋</button>
        </div>
        <div id="playlistForm" class="playlist-form" style="display:none">
          <input id="playlistNameInput" placeholder="Playlist name">
          <button id="savePlaylistButton" type="button">Create</button>
        </div>
        <div id="playlistList" class="playlist-list"><p class="muted">No playlists yet.</p></div>
      </section>
    </aside>

    <main class="listen-main">
      <header class="listen-topbar music-topbar">
        <div>
          <p class="section-kicker">No Read Music</p>
          <h1>Listen</h1>
        </div>
        <div class="top-search-wrap">
          <label class="search-label" for="searchInput">Search</label>
          <div class="top-search-box">
            <input id="searchInput" placeholder="Songs, artists, lyrics...">
            <button id="searchButton" type="button">Search</button>
          </div>
        </div>
        <a id="accountLink" class="button secondary top-account" href="login.html">Login</a>
      </header>

      <section class="spotify-layout improved-listen-layout">
        <div class="panel song-table-panel">
          <div class="table-head">
            <span>#</span><span>Title</span><span>Artist</span><span>Lyrics</span><span></span><span></span>
          </div>
          <div id="songsList" class="song-list"><p class="muted empty-list">Loading songs...</p></div>
        </div>

        <aside class="panel now-card compact-now-card">
          <img id="nowCover" src="assets/no-read-logo.png" alt="Current song cover">
          <div>
            <h3 id="nowPlaying">Nothing playing</h3>
            <p id="nowArtist" class="muted">No Read</p>
          </div>
          <div class="ad-box" id="adBox"></div>
          <span class="pill" id="adStatus">Ready</span>
        </aside>
      </section>
    </main>
  </div>

  <section class="player-bar spotify-player compact-player" id="playerBar">
    <div class="player-meta compact-player-meta">
      <img id="bottomCover" class="bottom-cover" src="assets/no-read-logo.png" alt="Current song cover">
      <div class="bottom-song-text">
        <strong id="bottomNowPlaying">Nothing playing</strong>
        <p class="muted" id="bottomNowArtist">No Read</p>
      </div>
      <span class="pill" id="bottomAdStatus">Ready</span>
    </div>
    <audio id="audioPlayer" controls preload="none"></audio>
  </section>

  <script src="auth-client.browser.js?v=20260530-2"></script>
  <script>
    const Auth = window.NoReadAuth;
    const songsList = document.getElementById('songsList');
    const player = document.getElementById('audioPlayer');
    const nowPlaying = document.getElementById('nowPlaying');
    const nowArtist = document.getElementById('nowArtist');
    const bottomNowPlaying = document.getElementById('bottomNowPlaying');
    const bottomNowArtist = document.getElementById('bottomNowArtist');
    const nowCover = document.getElementById('nowCover');
    const bottomCover = document.getElementById('bottomCover');
    const adBox = document.getElementById('adBox');
    const adStatus = document.getElementById('adStatus');
    const bottomAdStatus = document.getElementById('bottomAdStatus');
    const searchInput = document.getElementById('searchInput');
    const playlistList = document.getElementById('playlistList');
    const playlistForm = document.getElementById('playlistForm');
    const playlistNameInput = document.getElementById('playlistNameInput');

    let allSongs = [];
    let playlists = [];
    let activePlaylistId = null;
    let activePlaylistSongs = [];
    let loggedIn = false;

    const apiUrl = (path) => {
      if (!path) return '';
      if (/^https?:\/\//.test(path) || String(path).startsWith('data:') || String(path).startsWith('blob:')) return path;
      return `${Auth.apiBaseUrl()}${String(path).startsWith('/') ? path : `/${path}`}`;
    };

    const songIdOf = (song) => song?.id || song?._id || song?.songId;
    const artistUsername = (song) => song?.artist?.username || song?.artistUsername || song?.uploaderUsername || song?.username || '';
    const artistName = (song) => song?.artist?.displayName || song?.artist?.artistName || song?.artist?.username || song?.artistName || song?.uploaderName || song?.displayName || 'No Read Artist';
    const songCover = (song) => apiUrl(song?.coverImageUrl || song?.coverUrl || song?.coverPath || song?.imageUrl || song?.artworkUrl || 'assets/no-read-logo.png');
    const lyricsOf = (song) => song?.lyrics || song?.description || '';
    const directAudioOf = (song) => apiUrl(song?.audioUrl || song?.audioPath || song?.fileUrl || song?.streamUrl || song?.url || '');

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (ch) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch]));
    }

    function playlistSongCount(playlist) {
      if (Array.isArray(playlist?.songIds)) return playlist.songIds.length;
      if (Array.isArray(playlist?.songs)) return playlist.songs.length;
      return 0;
    }

    async function loadPlaylists() {
      if (!loggedIn) {
        playlists = [];
        playlistList.innerHTML = '<p class="muted">Login to create and sync playlists.</p>';
        return;
      }

      try {
        const payload = await Auth.listPlaylists();
        const list = payload.data?.playlists || payload.playlists || payload.data || [];
        playlists = Array.isArray(list) ? list : [];
        renderPlaylists();
      } catch (error) {
        playlistList.innerHTML = `<p class="muted">${escapeHtml(error.message || 'Could not load playlists.')}</p>`;
      }
    }

    async function createPlaylist(name) {
      const clean = String(name || '').trim();
      if (!clean) return null;
      if (!loggedIn) {
        alert('Login to create and sync playlists.');
        return null;
      }

      const payload = await Auth.createPlaylist({ name: clean });
      const playlist = payload.data?.playlist || payload.playlist || payload.data || null;
      await loadPlaylists();
      return playlist;
    }

    async function deletePlaylist(playlistId) {
      if (!loggedIn) {
        alert('Login to manage playlists.');
        return;
      }

      if (!confirm('Delete this playlist?')) return;
      await Auth.deletePlaylist(playlistId);
      if (String(activePlaylistId) === String(playlistId)) {
        activePlaylistId = null;
        activePlaylistSongs = [];
        renderSongs(filterSongs(allSongs));
      }
      await loadPlaylists();
    }

    async function openPlaylist(playlistId) {
      activePlaylistId = playlistId;
      try {
        const payload = await Auth.getPlaylist(playlistId);
        const playlist = payload.data?.playlist || payload.playlist || payload.data || null;
        activePlaylistSongs = Array.isArray(playlist?.songs)
          ? playlist.songs
          : allSongs.filter((song) => (playlist?.songIds || []).some((id) => String(id) === String(songIdOf(song))));
        renderSongs(filterSongs(activePlaylistSongs));
        renderPlaylists();
      } catch (error) {
        alert(error.message || 'Could not open playlist.');
      }
    }

    async function addSongToPlaylist(song) {
      const id = songIdOf(song);
      if (!id) return;
      if (!loggedIn) {
        alert('Login to create and sync playlists.');
        return;
      }

      if (!playlists.length) {
        const name = prompt('Create playlist name:');
        if (!name) return;
        const created = await createPlaylist(name);
        if (!created) return;
        await Auth.addSongToPlaylist(created.id, id);
        await loadPlaylists();
        return;
      }

      const names = playlists.map((p, index) => `${index + 1}. ${p.name}`).join('\n');
      const choice = prompt(`Add to playlist:\n${names}\n\nType playlist number, or type a new playlist name:`);
      if (!choice) return;

      let playlist = null;
      const number = Number(choice.trim());
      if (Number.isInteger(number) && playlists[number - 1]) {
        playlist = playlists[number - 1];
      } else {
        playlist = await createPlaylist(choice.trim());
      }
      if (!playlist) return;

      await Auth.addSongToPlaylist(playlist.id, id);
      await loadPlaylists();
      if (String(activePlaylistId) === String(playlist.id)) await openPlaylist(playlist.id);
    }

    async function removeSongFromActivePlaylist(songId) {
      if (!activePlaylistId || !songId) return;
      await Auth.removeSongFromPlaylist(activePlaylistId, songId);
      await loadPlaylists();
      await openPlaylist(activePlaylistId);
    }

    function renderPlaylists() {
      if (!loggedIn) {
        playlistList.innerHTML = '<p class="muted">Login to create and sync playlists.</p>';
        return;
      }

      const showAll = '<button id="showAllSongsButton" class="playlist-item show-all" type="button">All songs</button>';
      if (!playlists.length) {
        playlistList.innerHTML = '<p class="muted">No playlists yet.</p>' + showAll;
      } else {
        playlistList.innerHTML = playlists.map((playlist) => `
          <div class="playlist-item-wrap">
            <button class="playlist-item ${String(activePlaylistId) === String(playlist.id) ? 'active' : ''}" type="button" data-playlist-id="${escapeHtml(playlist.id)}">
              <span>${escapeHtml(playlist.name || 'Playlist')}</span>
              <small>${playlistSongCount(playlist)} songs</small>
            </button>
            <button class="playlist-delete-button" type="button" data-delete-playlist="${escapeHtml(playlist.id)}" title="Delete playlist">×</button>
          </div>
        `).join('') + showAll;
      }

      playlistList.querySelectorAll('[data-playlist-id]').forEach((button) => {
        button.addEventListener('click', () => openPlaylist(button.dataset.playlistId));
      });
      playlistList.querySelectorAll('[data-delete-playlist]').forEach((button) => {
        button.addEventListener('click', (event) => {
          event.stopPropagation();
          deletePlaylist(button.dataset.deletePlaylist).catch((error) => alert(error.message || 'Could not delete playlist.'));
        });
      });
      document.getElementById('showAllSongsButton')?.addEventListener('click', () => {
        activePlaylistId = null;
        activePlaylistSongs = [];
        renderSongs(filterSongs(allSongs));
        renderPlaylists();
      });
    }

    function filterSongs(songs) {
      const q = searchInput.value.trim().toLowerCase();
      if (!q) return songs;
      return songs.filter((song) => {
        return [song.title, artistName(song), artistUsername(song), lyricsOf(song)]
          .some((value) => String(value || '').toLowerCase().includes(q));
      });
    }

    function renderSongs(songs) {
      if (!songs.length) {
        songsList.innerHTML = `<p class="muted empty-list">${activePlaylistId ? 'This playlist is empty.' : 'No songs found.'}</p>`;
        return;
      }
      songsList.innerHTML = songs.map((song, index) => {
        const id = songIdOf(song);
        const username = artistUsername(song);
        const lyrics = lyricsOf(song);
        const playlistAction = activePlaylistId
          ? `<button class="playlist-remove-button secondary" type="button" data-remove-song="${escapeHtml(id)}" title="Remove from playlist">Remove</button>`
          : `<button class="playlist-add-button secondary" type="button" data-add-song="${escapeHtml(id)}" title="Add to playlist">＋</button>`;
        return `
          <article class="song-row improved-song-row" data-song-id="${escapeHtml(id)}">
            <span class="song-index">${index + 1}</span>
            <div class="song-title-cell">
              <img src="${escapeHtml(songCover(song))}" alt="${escapeHtml(song.title || 'Song')} cover">
              <div><strong>${escapeHtml(song.title || 'Untitled')}</strong><small>${song.explicit ? 'Explicit' : 'No Read'}</small></div>
            </div>
            <div>${username ? `<a href="artist.html?username=${encodeURIComponent(username)}">${escapeHtml(artistName(song))}</a>` : escapeHtml(artistName(song))}</div>
            <button class="lyrics-toggle secondary" type="button" data-lyrics="${escapeHtml(lyrics)}">Lyrics</button>
            ${playlistAction}
            <button class="play-round" type="button" data-play-song="${escapeHtml(id)}">▶</button>
          </article>`;
      }).join('');

      songsList.querySelectorAll('[data-play-song]').forEach((button) => {
        button.addEventListener('click', (event) => {
          event.stopPropagation();
          playSong(button.dataset.playSong, songs.find(s => String(songIdOf(s)) === String(button.dataset.playSong)) || null);
        });
      });
      songsList.querySelectorAll('[data-add-song]').forEach((button) => {
        button.addEventListener('click', (event) => {
          event.stopPropagation();
          const song = songs.find(s => String(songIdOf(s)) === String(button.dataset.addSong));
          if (song) addSongToPlaylist(song).catch((error) => alert(error.message || 'Could not add song.'));
        });
      });
      songsList.querySelectorAll('[data-remove-song]').forEach((button) => {
        button.addEventListener('click', (event) => {
          event.stopPropagation();
          removeSongFromActivePlaylist(button.dataset.removeSong).catch((error) => alert(error.message || 'Could not remove song.'));
        });
      });
      songsList.querySelectorAll('.song-row').forEach((row) => {
        row.addEventListener('dblclick', () => {
          const id = row.dataset.songId;
          playSong(id, songs.find(s => String(songIdOf(s)) === String(id)) || null);
        });
      });
      songsList.querySelectorAll('[data-lyrics]').forEach((button) => {
        button.addEventListener('click', (event) => {
          event.stopPropagation();
          const text = button.dataset.lyrics || 'No lyrics were added for this song.';
          alert(text);
        });
      });
    }

    async function loadSongs() {
      songsList.innerHTML = '<p class="muted empty-list">Loading songs...</p>';
      const q = searchInput.value.trim();
      try {
        const payload = await Auth.listSongs({ q, search: q });
        const songs = payload.data?.songs || payload.songs || payload.data || [];
        allSongs = Array.isArray(songs) ? songs : [];
        activePlaylistId = null;
        activePlaylistSongs = [];
        renderSongs(filterSongs(allSongs));
        await loadPlaylists();
      } catch (error) {
        songsList.innerHTML = `<p class="muted empty-list">${escapeHtml(error.message || 'Could not load songs.')}</p>`;
      }
    }

    function setNowPlaying(song) {
      const title = song?.title || 'Nothing playing';
      const artist = song ? artistName(song) : 'No Read';
      const cover = song ? songCover(song) : 'assets/no-read-logo.png';
      nowPlaying.textContent = title;
      bottomNowPlaying.textContent = title;
      nowArtist.textContent = artist;
      bottomNowArtist.textContent = artist;
      nowCover.src = cover;
      bottomCover.src = cover;
    }

    async function unlockWithAd(songId, knownSong, payload) {
      const data = payload.data || payload;
      const song = data.song || knownSong || { id: songId, title: data.title || 'No Read song' };
      const streamNow = data.streamUrl || data.url || data.audioUrl;
      setNowPlaying(song);

      if (streamNow) {
        player.src = apiUrl(streamNow);
        adBox.classList.remove('show');
        adStatus.textContent = 'Playing';
        bottomAdStatus.textContent = 'Playing';
        await player.play().catch(() => {});
        return;
      }

      const ad = data.ad || { durationSeconds: data.adSeconds || 5, title: 'No Read' };
      const sessionId = data.playSessionId || data.sessionId || data.id;
      if (!sessionId) throw new Error('The server did not return a play session id.');

      let remaining = Math.max(1, Number(ad.durationSeconds || ad.seconds || 5));
      adBox.classList.add('show');
      adStatus.textContent = 'Ad';
      bottomAdStatus.textContent = 'Ad';
      adBox.innerHTML = `<strong>${escapeHtml(ad.title || 'No Read')}</strong><p>${escapeHtml(ad.message || 'Unlocking audio...')}</p><p><span id="countdown">${remaining}</span>s</p>`;

      const timer = setInterval(async () => {
        remaining -= 1;
        const counter = document.getElementById('countdown');
        if (counter) counter.textContent = Math.max(remaining, 0);
        if (remaining <= 0) {
          clearInterval(timer);
          adStatus.textContent = 'Unlocking';
          bottomAdStatus.textContent = 'Unlocking';
          try {
            const donePayload = await Auth.completeSongAd(sessionId);
            const done = donePayload.data || donePayload;
            const streamUrl = done.streamUrl || done.url || done.audioUrl || Auth.getStreamUrl(songId, sessionId);
            player.src = apiUrl(streamUrl);
            adBox.classList.remove('show');
            adStatus.textContent = 'Playing';
            bottomAdStatus.textContent = 'Playing';
            await player.play().catch(() => {});
          } catch (error) {
            adStatus.textContent = 'Error';
            bottomAdStatus.textContent = 'Error';
            adBox.textContent = error.message || 'Could not unlock this song.';
          }
        }
      }, 1000);
    }

    async function playSong(songId, knownSong) {
      const direct = directAudioOf(knownSong);
      try {
        player.pause();
        player.removeAttribute('src');
        player.load();
        setNowPlaying(knownSong || { title: 'Loading...', coverUrl: 'assets/no-read-logo.png' });
        adBox.classList.add('show');
        adStatus.textContent = 'Loading';
        bottomAdStatus.textContent = 'Loading';
        adBox.textContent = 'Preparing audio...';

        const payload = await Auth.startSongPlay(songId);
        await unlockWithAd(songId, knownSong, payload);
      } catch (error) {
        if (direct) {
          setNowPlaying(knownSong);
          player.src = direct;
          adBox.classList.remove('show');
          adStatus.textContent = 'Playing';
          bottomAdStatus.textContent = 'Playing';
          await player.play().catch(() => {});
          return;
        }
        adStatus.textContent = 'Error';
        bottomAdStatus.textContent = 'Error';
        adBox.classList.add('show');
        adBox.textContent = error.message || 'Could not start this song.';
      }
    }

    document.getElementById('searchButton').addEventListener('click', () => {
      activePlaylistId = null;
      activePlaylistSongs = [];
      loadSongs();
    });
    searchInput.addEventListener('input', () => {
      if (activePlaylistId) {
        renderSongs(filterSongs(activePlaylistSongs));
      } else {
        renderSongs(filterSongs(allSongs));
      }
    });
    searchInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') loadSongs();
    });

    document.getElementById('newPlaylistButton').addEventListener('click', () => {
      if (!loggedIn) {
        alert('Login to create and sync playlists.');
        return;
      }
      playlistForm.style.display = playlistForm.style.display === 'none' ? 'grid' : 'none';
      playlistNameInput.focus();
    });
    document.getElementById('savePlaylistButton').addEventListener('click', async () => {
      try {
        const playlist = await createPlaylist(playlistNameInput.value);
        if (playlist) {
          playlistNameInput.value = '';
          playlistForm.style.display = 'none';
        }
      } catch (error) {
        alert(error.message || 'Could not create playlist.');
      }
    });

    (async () => {
      const state = await Auth.getSessionState({ verify: true });
      loggedIn = Boolean(state.loggedIn);
      if (state.loggedIn) {
        document.getElementById('accountLink').textContent = Auth.getDisplayName();
        document.getElementById('accountLink').href = 'account.html';
        if (Auth.hasAnyRole(['admin', 'owner'], state.user || Auth.getSavedUser())) {
          document.getElementById('ownerPanelLink').style.display = 'block';
        }
      }
      await loadSongs();
    })();
  </script>
</body>
</html>
