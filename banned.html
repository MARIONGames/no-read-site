<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>No Read — Account Banned</title>
  <link rel="stylesheet" href="auth.css?v=20260531-banned" />
  <style>
    .banned-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 20% 10%, rgba(255, 22, 22, .25), transparent 35%),
        radial-gradient(circle at 80% 90%, rgba(12, 140, 255, .18), transparent 35%),
        #050505;
      color: #f7f7f7;
    }
    .banned-card {
      width: min(560px, 100%);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 32px;
      padding: 34px;
      background: rgba(12,12,16,.86);
      box-shadow: 0 28px 90px rgba(0,0,0,.42);
      text-align: center;
    }
    .banned-logo {
      width: 96px;
      height: 96px;
      border-radius: 28px;
      object-fit: contain;
      background: #fff;
      padding: 8px;
      margin-bottom: 18px;
    }
    .banned-card h1 {
      font-size: clamp(36px, 8vw, 64px);
      margin: 0 0 10px;
      letter-spacing: -0.06em;
    }
    .banned-card p {
      color: rgba(247,247,247,.72);
      line-height: 1.6;
      margin: 0 auto 24px;
      max-width: 430px;
    }
    .banned-actions {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr 1fr;
    }
    .banned-actions a,
    .banned-actions button {
      border: 0;
      border-radius: 18px;
      padding: 14px 16px;
      color: #fff;
      font-weight: 900;
      cursor: pointer;
      text-decoration: none;
      background: linear-gradient(135deg, #ff1616, #0c8cff);
    }
    .banned-actions button {
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.12);
    }
    @media (max-width: 560px) {
      .banned-actions { grid-template-columns: 1fr; }
      .banned-card { padding: 26px; }
    }
  </style>
</head>
<body class="banned-page">
  <main class="banned-card">
    <img class="banned-logo" src="assets/no-read-logo.png" alt="No Read logo">
    <h1>Account Banned</h1>
    <p>This account cannot access No Read services. Login, upload, playlists, settings, and owner tools are blocked.</p>
    <div class="banned-actions">
      <a href="index.html">Back to Home</a>
      <button id="clearSessionButton" type="button">Clear Session</button>
    </div>
  </main>

  <script src="auth-client.browser.js?v=20260531-banned"></script>
  <script>
    document.getElementById('clearSessionButton').addEventListener('click', () => {
      if (window.NoReadAuth && typeof window.NoReadAuth.clearLocalSession === 'function') {
        window.NoReadAuth.clearLocalSession();
      }
      localStorage.removeItem('NO_READ_AUTH_TOKEN');
      localStorage.removeItem('NO_READ_AUTH_USER');
      sessionStorage.removeItem('NO_READ_BANNED_REDIRECT');
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
